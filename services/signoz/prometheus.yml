# =============================================================================
# Prometheus config for SigNoz query-service
# =============================================================================
global:
  scrape_interval: 60s
  evaluation_interval: 60s

scrape_configs:
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: ".*"
        target_label: __name__
        replacement: "$1"
