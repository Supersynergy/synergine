# NATS Server Configuration for SuperStack
# This configuration enables JetStream, clustering, and authorization

# ============================================
# SERVER INFORMATION
# ============================================
# Server name and identity
server_name: superstack-nats

# Verbose mode for detailed logging
verbose: true

# ============================================
# NETWORK & PORTS
# ============================================
# Client port - where NATS clients connect
port: 4222

# HTTP monitoring port - web dashboard and stats
http_port: 8222

# Cluster port - for NATS server clustering
cluster {
    port: 6222
    # Cluster name for this deployment
    name: superstack-cluster
}

# ============================================
# JETSTREAM CONFIGURATION
# ============================================
# Enable JetStream - persistent message streaming
jetstream {
    # Maximum amount of memory JetStream can use for in-memory storage
    max_memory_store: 512M

    # Maximum amount of disk space JetStream can use for file storage
    max_file_store: 2G

    # Interval to check for stale stream file stores
    store_dir: /data/jetstream
}

# ============================================
# AUTHORIZATION
# ============================================
# Define authorization tokens and users
authorization {
    # Default user/password (optional)
    token: ${NATS_AUTH_TOKEN}

    # Define multiple users with different permissions
    users: [
        {
            # Admin user with full permissions
            user: admin
            password: ${NATS_ADMIN_PASSWORD}
            permissions {
                publish: ">"
                subscribe: ">"
            }
        },
        {
            # Application user with restricted permissions
            user: app
            password: ${NATS_APP_PASSWORD}
            permissions {
                publish: "app.>"
                subscribe: "app.>"
            }
        },
        {
            # System user for monitoring
            user: monitor
            password: ${NATS_MONITOR_PASSWORD}
            permissions {
                subscribe: "$SYS.>"
                publish: ""
            }
        }
    ]
}

# ============================================
# LOGGING
# ============================================
# Log level: debug, info, warn, error
debug: false

# Log to stdout for container logging
logfile: ""

# Log timestamps with nanosecond precision
log_time_format: "2006-01-02T15:04:05.000000000Z07:00"

# ============================================
# PERFORMANCE & LIMITS
# ============================================
# Maximum payload size in bytes (1MB)
max_payload: 1048576

# Maximum number of client connections
max_connections: 1024

# Maximum number of subscriptions per client
max_subscriptions: 0  # 0 = unlimited

# ============================================
# CONNECTIONS & TIMEOUTS
# ============================================
# Ping clients to check connectivity
ping_interval: "2m"

# Wait for pong response before closing connection
ping_max: 2

# Timeout for client connections
write_deadline: "10s"

# ============================================
# TAILING CURSOR FOR MONITORING
# ============================================
# Enable tailing cursor logs (useful for monitoring)
enable_jetstream_monitoring: true

